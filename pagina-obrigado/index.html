<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição Confirmada | Masterclass de Peptídeos</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <!-- Meta NoIndex: Não queremos que esta página apareça no Google -->
    <meta name="robots" content="noindex, nofollow">
</head>
<body>
    <div class="thank-you-container">
        <div class="icon-success">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        
        <h1 class="title">Inscrição Confirmada!</h1>
        <p class="subtitle">Sua vaga na Masterclass de Peptídeos foi reservada com sucesso. Você será redirecionado para o WhatsApp para garantir sua inscrição em instantes.</p>
        
        <a href="#" id="whatsapp-btn" class="whatsapp-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-7.6 8.38 8.38 0 0 1 3.8.9L22 2l-1.5 5.5Z"></path>
            </svg>
            GARANTIR INSCRIÇÃO AGORA
        </a>
        
        <div id="redirect-msg" class="redirect-status">
            <div class="loader"></div>
            <span>Redirecionando em <strong id="countdown">5</strong> segundos...</span>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5511976974770";
        const msg = encodeURIComponent("Olá! Acabei de me inscrever na Masterclass de Peptídeos e quero garantir minha vaga!");
        const whatsappURL = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;
        
        let counter = 5;
        const countdownEl = document.getElementById('countdown');
        const btn = document.getElementById('whatsapp-btn');
        const redirectMsg = document.getElementById('redirect-msg');
        
        // Define o link do botão
        btn.href = whatsappURL;

        const interval = setInterval(() => {
            counter--;
            if (countdownEl) countdownEl.textContent = counter;
            
            if (counter <= 0) {
                clearInterval(interval);
                
                // Mostrar o botão como fallback e animação
                btn.classList.add('visible');
                
                // Esconder a mensagem de redirect automático
                if(redirectMsg) redirectMsg.style.display = 'none';

                // Redirecionamento Automático
                window.location.href = whatsappURL;
            }
        }, 1000);
    </script>
</body>
</html>
